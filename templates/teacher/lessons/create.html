{% extends 'teacher/base_teacher.html' %}

{% block content %}
<div class="p-4 md:p-8 max-w-3xl mx-auto">
  <!-- Header -->
  <div class="mb-8">
    <a href="{% url 'teacher_course_lessons' course.id %}" class="text-slate-500 hover:text-slate-700 text-sm inline-flex items-center gap-1 mb-4">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Retour aux leçons
    </a>
    <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Ajouter une leçon</h1>
    <p class="text-slate-500 mt-1">{{ course.title }}</p>
  </div>

  <!-- Form -->
  <form method="post" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8">
    {% csrf_token %}
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
      <!-- Title -->
      <div class="md:col-span-2">
        <label for="title" class="block text-sm font-medium text-slate-700 mb-2">Titre de la leçon *</label>
        <input type="text" id="title" name="title" required
          class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all"
          placeholder="ex: Les variables en Python">
      </div>
      
      <!-- Order -->
      <div>
        <label for="order" class="block text-sm font-medium text-slate-700 mb-2">Ordre</label>
        <input type="number" id="order" name="order" value="{{ form_data.order|default:'0' }}" min="0"
          class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all">
      </div>
      
      <!-- Duration -->
      <div>
        <label for="duration_minutes" class="block text-sm font-medium text-slate-700 mb-2">Durée (minutes)</label>
        <input type="number" id="duration_minutes" name="duration_minutes" value="{{ form_data.duration_minutes|default:'0' }}" min="0"
          class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all">
      </div>
    </div>
    
    <!-- Video URL (legacy single field) -->
    <div class="mb-6">
      <label for="video_url" class="block text-sm font-medium text-slate-700 mb-2">URL de la vidéo principale (optionnel)</label>
      <input type="url" id="video_url" name="video_url" value="{{ form_data.video_url|default:'' }}"
        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all"
        placeholder="https://...">
    </div>

    <!-- Multiple Video Links -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-700 mb-2">Liens vidéo supplémentaires</label>
      <div id="video-links-container" class="space-y-3">
        <!-- Dynamic video entries will be added here -->
      </div>
      <button type="button" onclick="addVideoLink()" class="mt-3 inline-flex items-center gap-1 px-4 py-2 bg-amber-100 hover:bg-amber-200 text-amber-700 rounded-lg text-sm font-medium transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Ajouter une vidéo
      </button>
    </div>
    
    <!-- Content -->
    <div class="mb-8">
      <label for="content" class="block text-sm font-medium text-slate-700 mb-2">Contenu</label>
      <textarea id="content" name="content" rows="8"
        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all resize-none"
        placeholder="Contenu de la leçon...">{{ form_data.content|default:'' }}</textarea>
    </div>
    
    <!-- Buttons -->
    <div class="flex items-center gap-3 pt-6 border-t border-slate-100">
      <button type="submit" class="px-6 py-3 bg-amber-500 hover:bg-amber-600 text-white rounded-lg font-medium transition-colors">
        Ajouter la leçon
      </button>
      <a href="{% url 'teacher_course_lessons' course.id %}" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium transition-colors">
        Annuler
      </a>
    </div>
  </form>
</div>

<script>
let videoCount = 0;
function addVideoLink(url, title) {
  url = url || '';
  title = title || '';
  const container = document.getElementById('video-links-container');
  const div = document.createElement('div');
  div.className = 'flex items-start gap-2 bg-slate-50 p-3 rounded-lg';
  div.id = 'video-row-' + videoCount;
  div.innerHTML = `
    <div class="flex-1 space-y-2">
      <input type="url" name="video_urls[]" value="${url}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm" placeholder="https://...">
      <input type="text" name="video_titles[]" value="${title}" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-amber-500 outline-none text-sm" placeholder="Titre (optionnel)">
    </div>
    <button type="button" onclick="removeVideoLink(${videoCount})" class="px-2 py-1 text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>`;
  container.appendChild(div);
  videoCount++;
}
function removeVideoLink(id) {
  const el = document.getElementById('video-row-' + id);
  if (el) el.remove();
}
</script>
{% endblock %}
