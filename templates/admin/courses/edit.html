{% extends 'admin/base_admin.html' %}

{% block content %}
<div class="p-4 md:p-8 max-w-3xl mx-auto">
  <div class="mb-8">
    <a href="{% url 'admin_courses_list' %}" class="text-slate-500 hover:text-slate-700 text-sm inline-flex items-center gap-1 mb-4">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Retour
    </a>
    <h1 class="text-2xl md:text-3xl font-bold text-slate-800">Modifier le cours</h1>
    <p class="text-slate-500 mt-1">{{ course.title }}</p>
  </div>

  <form method="post" enctype="multipart/form-data" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 md:p-8">
    {% csrf_token %}
    
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-700 mb-2">Titre *</label>
      <input type="text" name="title" value="{{ course.title }}" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none">
    </div>
    
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-700 mb-2">Description</label>
      <textarea name="description" rows="4" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none resize-none">{{ course.description }}</textarea>
    </div>
    
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-700 mb-2">Enseignant</label>
      <select name="teacher" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none bg-white">
        {% for teacher in teachers %}
        <option value="{{ teacher.id }}" {% if course.teacher_id == teacher.id %}selected{% endif %}>{{ teacher.name }}</option>
        {% endfor %}
      </select>
    </div>
    
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-700 mb-2">Statut</label>
      <select name="status" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none bg-white">
        <option value="draft" {% if course.status == 'draft' %}selected{% endif %}>Brouillon</option>
        <option value="published" {% if course.status == 'published' %}selected{% endif %}>Publié</option>
        <option value="archived" {% if course.status == 'archived' %}selected{% endif %}>Archivé</option>
      </select>
    </div>
    
    <div class="mb-8">
      <label class="block text-sm font-medium text-slate-700 mb-2">Image</label>
      <div class="flex items-center gap-4">
        <div class="w-24 h-24 rounded-lg bg-slate-100 flex items-center justify-center overflow-hidden">
          {% if course.image %}
          <img src="{{ course.image.url }}" class="w-full h-full object-cover">
          {% else %}
          <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          {% endif %}
        </div>
        <input type="file" name="image" accept="image/*" class="flex-1 text-sm">
      </div>
    </div>
    
    <div class="flex items-center gap-3 pt-6 border-t border-slate-100">
      <button type="submit" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium">Enregistrer</button>
      <a href="{% url 'admin_courses_list' %}" class="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
